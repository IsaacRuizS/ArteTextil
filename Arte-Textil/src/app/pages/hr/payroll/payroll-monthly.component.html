<div class="hr-wrapper p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0">Planillas Mensuales</h2>
        <form [formGroup]="form" class="d-flex gap-2">

            <input class="form-control" style="width:160px" placeholder="YYYY-MM" formControlName="period">

            <button type="button" class="btn btn-primary" (click)="generate()">

                Generar

            </button>

        </form>
    </div>

    <div class="card shadow-sm border-0">
        <div class="table-responsive">
            <table class="table mb-0">
                <thead class="bg-light">
                    <tr>
                        <th>Usuario</th>
                        <th>Periodo</th>
                        <th>Total</th>
                        <th>Estado</th>
                        <th class="text-end">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let p of payrolls">
                        <td>{{ p.userName || p.userId }}</td>
                        <td>{{ p.month }}</td>
                        <td>₡ {{ p.total }}</td>
                        <td><span class="badge" [class.bg-warning]="p.status==='Pendiente'"
                                [class.bg-success]="p.status==='Aprobada'">{{ p.status }}</span></td>
                        <td class="text-end">
                            <button class="btn btn-sm btn-success me-2" (click)="approve(p)"
                                [disabled]="p.status==='Aprobada'"><i class="mdi mdi-check"></i></button>
                            <button class="btn btn-sm btn-primary" (click)="registerPayment(p)"><i
                                    class="mdi mdi-cash"></i> Pagar</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
