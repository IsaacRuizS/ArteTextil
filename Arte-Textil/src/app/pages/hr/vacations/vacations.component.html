<div class="hr-wrapper p-4">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold mb-0">Solicitudes de Vacaciones</h2>

    <button class="btn btn-primary" (click)="openCreateModal()">
        <i class="mdi mdi-plus-circle me-1"></i>Nueva solicitud
    </button>
</div>

    <!-- FILTER -->
    <div class="mb-4">
        <input type="text" class="form-control" placeholder="Buscar por usuario o estado..."
            (input)="onSearch($event)">
    </div>

    <!-- LIST -->
    <div class="card shadow-sm border-0">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="bg-light">
                    <tr>
                        <th class="ps-4">Usuario</th>
                        <th>Inicio</th>
                        <th>Fin</th>
                        <th>Estado</th>
                        <th class="text-end pe-4" *ngIf="isAdmin">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let v of vacations">
                        <td class="ps-4 fw-semibold">{{ v.userName || v.userId }}</td>
                        <td>{{ v.startDate | date:'shortDate' }}</td>
                        <td>{{ v.endDate | date:'shortDate' }}</td>
                        <td>
                            <span class="badge rounded-pill"
                                [class.bg-warning-subtle]="v.status === 'Pendiente'"
                                [class.text-warning]="v.status === 'Pendiente'"
                                [class.bg-success-subtle]="v.status === 'Aprobada'"
                                [class.text-success]="v.status === 'Aprobada'"
                                [class.bg-danger-subtle]="v.status === 'Rechazada'"
                                [class.text-danger]="v.status === 'Rechazada'">
                                {{ v.status }}
                            </span>
                        </td>
                        <td class="text-end pe-4" *ngIf="isAdmin">
    <button class="btn btn-sm btn-light text-success me-2"
        (click)="approve(v)">
        <i class="mdi mdi-check"></i>
    </button>
    <button class="btn btn-sm btn-light text-danger"
        (click)="reject(v)">
        <i class="mdi mdi-close"></i>
    </button>
</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- CREATE MODAL -->
@if (showFormModal) {
<div class="modal d-block" tabindex="-1" style="background: rgba(0,0,0,0.5)">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold">Nueva solicitud</h5>
                <button type="button" class="btn-close" (click)="showFormModal = false"></button>
            </div>

            <div class="modal-body">
                <form [formGroup]="vacationForm">

                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">Fecha inicio</label>
                        <input type="date" class="form-control"
                            formControlName="startDate">
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">Fecha fin</label>
                        <input type="date" class="form-control"
                            formControlName="endDate">
                    </div>

                </form>
            </div>

            <div class="modal-footer border-0 pt-0">
                <button class="btn btn-light" (click)="showFormModal = false">Cancelar</button>
                <button class="btn btn-primary px-4" (click)="saveVacation()">Guardar</button>
            </div>
        </div>
    </div>
</div>
}

</div>
