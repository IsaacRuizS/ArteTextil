<div class="p-4">

    <div class="d-flex justify-content-between mb-3">
        <h3>Segmentación de Clientes</h3>

        <select class="form-select w-auto" (change)="changeFilter($event)">
            <option value="">Todos</option>
            <option value="Frecuente">Frecuentes</option>
            <option value="Nuevo">Nuevos</option>
            <option value="Inactivo">Inactivos</option>
        </select>
    </div>

    <table class="table table-hover">
        <thead>
            <tr>
                <th>Cliente</th>
                <th>Cotizaciones</th>
                <th>Última</th>
                <th>Segmento</th>
            </tr>
        </thead>

        <tbody>
            <tr *ngFor="let c of segments">
                <td>{{ c.fullName }}</td>
                <td>{{ c.quotesCount }}</td>
                <td>{{ c.lastQuote ? (c.lastQuote | date:'shortDate') : '-' }}</td>
                <td>{{ c.segment }}</td>
            </tr>
        </tbody>
    </table>

</div>
