<div class="p-4">

    <h3 class="mb-4">Alertas del Sistema</h3>

    <div *ngIf="alerts.length === 0" class="alert alert-success">
        No hay alertas activas 🎉
    </div>

    <div *ngFor="let alert of alerts"
         class="card mb-3 shadow-sm"
         [class.border-danger]="!alert.isRead">

        <div class="card-body">
            <h5 class="card-title">{{ alert.title }}</h5>
            <p class="card-text">{{ alert.message }}</p>
            <small class="text-muted">
                {{ alert.createdAt | date:'short' }}
            </small>
        </div>

    </div>

</div>
