<div class="p-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="mb-0">🔔 Alertas del Sistema</h3>
        <span class="badge bg-danger" *ngIf="alerts.length > 0">
            {{ alerts.length }}
        </span>
    </div>

    <!-- SIN ALERTAS -->
    <div *ngIf="alerts.length === 0" class="text-center p-5 border rounded bg-light">
        <h5 class="text-success">🎉 Todo en orden</h5>
        <p class="text-muted mb-0">No hay alertas pendientes</p>
    </div>

    <!-- ALERTAS -->
    <div *ngFor="let alert of alerts" class="card mb-3 shadow-sm border-0 alert-card">

        <div class="card-body d-flex justify-content-between align-items-start">

            <div>
                <h6 class="mb-1 fw-bold">{{ alert.title }}</h6>
                <p class="mb-2 text-muted small">{{ alert.message }}</p>

                <small class="text-muted">
                    {{ alert.createdAt | date:'short' }}
                </small>
            </div>

            <!-- BOTÓN CHECK -->
            <button class="btn btn-sm btn-outline-success ms-3" (click)="markAsRead(alert)">
                ✔
            </button>

        </div>

    </div>

</div>
