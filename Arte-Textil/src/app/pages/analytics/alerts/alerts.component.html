<div class="p-3 p-md-4">

    <!-- ENCABEZADO -->
    <div class="d-flex flex-wrap gap-2 align-items-center mb-4">
        <h3 class="mb-0">Alertas del Sistema</h3>
        <span class="badge bg-primary rounded-pill fs-6" *ngIf="alerts.length > 0">
            {{ alerts.length }}
        </span>
    </div>

    <!-- SIN ALERTAS -->
    <div *ngIf="alerts.length === 0" class="text-center p-5 border rounded bg-light">
        <div class="fs-1 mb-2">✅</div>
        <h5 class="text-success">Todo en orden</h5>
        <p class="text-muted mb-0">No hay alertas pendientes</p>
    </div>

    <!-- LISTA DE ALERTAS -->
    <div class="row g-3">
        <div class="col-12 col-md-6 col-xl-4" *ngFor="let alert of alerts">
            <div class="card h-100 shadow-sm border-0 border-start border-4 border-warning">
                <div class="card-body d-flex flex-column gap-2">

                    <!-- Título + fecha -->
                    <div class="d-flex justify-content-between align-items-start gap-2">
                        <h6 class="mb-0 fw-bold text-truncate flex-grow-1" [title]="alert.title">
                            {{ alert.title }}
                        </h6>
                        <small class="text-muted text-nowrap">
                            {{ alert.createdAt | date:'dd/MM/yy HH:mm' }}
                        </small>
                    </div>

                    <!-- Mensaje (máx 3 líneas) -->
                    <p class="mb-0 text-muted small message-clamp">{{ alert.message }}</p>

                    <!-- Acciones -->
                    <div class="d-flex gap-2 mt-auto pt-1">
                        <button class="btn btn-sm btn-outline-secondary flex-grow-1"
                                (click)="openDetail(alert)">
                            Ver detalle
                        </button>
                        <button class="btn btn-sm btn-outline-success"
                                (click)="markAsRead(alert)"
                                title="Marcar como leída">
                            ✔
                        </button>
                    </div>

                </div>
            </div>
        </div>
    </div>

</div>

<!-- MODAL DETALLE -->
<div class="modal fade" [class.show]="selectedAlert" [style.display]="selectedAlert ? 'block' : 'none'"
     tabindex="-1" (click)="closeDetail($event)">
    <div class="modal-dialog modal-fullscreen">
        <div class="modal-content" (click)="$event.stopPropagation()">

            <div class="modal-header border-warning border-bottom-3">
                <h5 class="modal-title fw-bold">{{ selectedAlert?.title }}</h5>
                <button type="button" class="btn-close" (click)="selectedAlert = null"></button>
            </div>

            <div class="modal-body">
                <p class="mb-3" style="white-space: pre-wrap; word-break: break-word;">
                    {{ selectedAlert?.message }}
                </p>
                <small class="text-muted">
                    Generada el {{ selectedAlert?.createdAt | date:'dd/MM/yyyy HH:mm' }}
                </small>
            </div>

            <div class="modal-footer">
                <button class="btn btn-outline-secondary btn-sm" (click)="selectedAlert = null">
                    Cerrar
                </button>
                <button class="btn btn-success btn-sm" (click)="markAsRead(selectedAlert!); selectedAlert = null">
                    ✔ Marcar como leída
                </button>
            </div>

        </div>
    </div>
</div>

<!-- Backdrop del modal -->
<div class="modal-backdrop fade show" *ngIf="selectedAlert" (click)="selectedAlert = null"></div>
