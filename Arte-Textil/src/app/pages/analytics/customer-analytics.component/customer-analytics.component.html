<div class="analytics-container">

    <h2 class="fw-bold mb-4">Análisis de Clientes</h2>

    <!-- FILTROS -->
    <div class="card shadow-sm p-4 mb-4">
        <h5 class="fw-semibold mb-3">Filtros</h5>

        <div class="row g-3">
            <div class="col-12 col-sm-6 col-md-3">
                <label class="form-label fw-semibold">Fecha inicio</label>
                <input type="date" [(ngModel)]="filtros.fechaInicio" class="form-control">
            </div>

            <div class="col-12 col-sm-6 col-md-3">
                <label class="form-label fw-semibold">Fecha fin</label>
                <input type="date" [(ngModel)]="filtros.fechaFin" class="form-control">
            </div>

            <div class="col-12 col-sm-6 col-md-3">
                <label class="form-label fw-semibold">Clasificación</label>
                <select class="form-select" [(ngModel)]="filtros.clasificacion">
                    <option value="">Todas</option>
                    <option value="Cliente Nuevo">Cliente Nuevo</option>
                    <option value="Cliente Frecuente">Cliente Frecuente</option>
                    <option value="Cliente Premium">Cliente Premium</option>
                    <option value="Cliente Inactivo">Cliente Inactivo</option>
                </select>
            </div>

            <div class="col-12 col-sm-6 col-md-3">
                <label class="form-label fw-semibold">Actividad reciente</label>
                <select class="form-select" [(ngModel)]="filtros.actividad">
                    <option value="">Todas</option>
                    <option value="7">Últimos 7 días</option>
                    <option value="30">Últimos 30 días</option>
                    <option value="180">Últimos 6 meses</option>
                </select>
            </div>
        </div>

        <div class="mt-4 d-flex gap-3">
            <button class="btn btn-primary" (click)="aplicarFiltros()">Aplicar filtros</button>
            <button class="btn btn-outline-secondary" (click)="limpiarFiltros()">Limpiar</button>
            <button class="btn btn-success ms-auto" (click)="downloadReport()">
                <i class="mdi mdi-download"></i> Descargar Reporte
            </button>
        </div>
    </div>

    <!-- MÉTRICAS -->
    <div class="row g-4 mb-4">
        @for (card of metricCards; track card.title) {
        <div class="col-12 col-sm-6 col-md-3">
            <div class="metric-card card shadow-sm p-3 text-center">
                <h6 class="fw-semibold">{{ card.title }}</h6>
                <h3 class="fw-bold text-primary">{{ card.value }}</h3>
            </div>
        </div>
        }
    </div>

    <!-- GRÁFICOS -->
    <div class="row g-4 mb-4">

        <div class="col-md-6">
            <div class="card shadow-sm p-3 chart-container">
                <h6 class="fw-semibold mb-3">Cotizaciones por tipo de cliente</h6>
                <canvas #barChartCanvas></canvas>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow-sm p-3 chart-container">
                <h6 class="fw-semibold mb-3">Actividad por mes</h6>
                <canvas #lineChartCanvas></canvas>
            </div>
        </div>
    </div>

    <!-- LIST of customers -->
    <div style="margin-top: 50px;">
        <app-customers-smart-list [customers]="customers" [page]="page" [showActions]="false" [itemsPerPage]="15"
            (pageChange)="page = $event">
        </app-customers-smart-list>
    </div>

</div>
