<div class="quotes-wrapper p-4">

    <!-- HEADER -->

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2 class="fw-bold mb-0">
            Gestión de Cotizaciones
        </h2>

        <button class="btn btn-primary" (click)="openCreateModal()">
            <i class="mdi mdi-plus-circle me-1"></i>
            Nueva Cotización
        </button>

    </div>


    <!-- FILTROS -->

    <div class="row mb-4 g-2">

        <div class="col-md-8">

            <input type="text" class="form-control" placeholder="Buscar por cliente, estado o notas..."
                (input)="onSearch($event)">

        </div>

        <div class="col-md-4">

            <select class="form-select" [(ngModel)]="statusFilter" (change)="onStatusChanged()">

                <option value="0">Todos</option>
                <option value="1">Activos</option>
                <option value="2">Inactivos</option>

            </select>

        </div>

    </div>


<!-- TABLA -->
<app-quotes-smart-list
    [quotes]="quotes"
    [page]="page"
    [itemsPerPage]="50"
    [showActions]="true"
    (pageChange)="page = $event"
    (edit)="openEditModal($event)"
    (toggleActive)="openDeleteModal($event)">
</app-quotes-smart-list>


<!-- MODAL FORM -->

@if (showFormModal) {

<app-quotes-modal [quote]="quoteSelected" [isEditing]="isEditing" (saved)="onSaved()" (closed)="showFormModal = false">
</app-quotes-modal>

}


<!-- DELETE MODAL -->

@if (showDeleteModal) {

<div class="modal d-block" style="background: rgba(0,0,0,0.5)">

    <div class="modal-dialog modal-sm modal-dialog-centered">

        <div class="modal-content text-center p-3">

            <div class="modal-body">

                <div class="mb-3 text-danger display-4">
                    <i class="mdi mdi-alert-circle-outline"></i>
                </div>

                <h5 class="mb-2 fw-bold">¿Modificar estado?</h5>

                <p class="text-muted small">
                    ¿Deseas cambiar el estado de la cotización?
                </p>

                <div class="d-flex justify-content-center gap-2 mt-4">

                    <button class="btn btn-light" (click)="showDeleteModal = false">
                        Cancelar
                    </button>

                    <button class="btn btn-danger px-4" (click)="confirmDelete()">
                        Modificar
                    </button>

                </div>

            </div>

        </div>

    </div>

</div>

}
